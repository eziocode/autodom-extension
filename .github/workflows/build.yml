name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: "server/package-lock.json"

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Audit (fail on high+)
        working-directory: server
        run: npm audit --audit-level=high

      - name: Syntax check all JavaScript
        run: git ls-files '*.js' '*.mjs' '*.cjs' | xargs -n1 node --check

      - name: Validate manifest
        run: python3 -c "import json; json.load(open('extension/manifest.json'))"

      - name: WebSocket auth test
        working-directory: server
        run: node test/test-wsauth.mjs

      - name: Extension and updater unit tests
        run: node --test tests/*.test.mjs server/test/test-update-utils.mjs

      - name: Bridge reliability tests
        working-directory: server
        run: |
          node test/test-reconnect.cjs
          node test/test-proxy-reconnect.cjs
          node test/test-concurrency.cjs
          node test/e2e.cjs

      - name: Build Chrome zip
        run: bash scripts/build-chrome.sh
