name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: "server/package-lock.json"

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Audit (fail on high+)
        working-directory: server
        run: npm audit --audit-level=high

      - name: Syntax check (server)
        working-directory: server
        run: node --check index.js && node --check cli.js && node --check wrapper.js

      - name: Syntax check (extension)
        run: |
          for f in extension/background/service-worker.js \
                   extension/common/webext-api.js \
                   extension/content/chat-panel.js \
                   extension/content/session-border.js \
                   extension/popup/popup.js; do
            node --check "$f"
          done

      - name: Validate manifest
        run: python3 -c "import json; json.load(open('extension/manifest.json'))"

      - name: WebSocket auth test
        working-directory: server
        run: node test/test-wsauth.mjs

      - name: End-to-end smoke test
        working-directory: server
        run: node test/e2e.cjs

      - name: Build Chrome zip
        run: bash scripts/build-chrome.sh
