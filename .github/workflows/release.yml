name: Release

# Triggers on a semver tag like v2.2.0. The tag's name (minus the leading "v")
# is treated as the canonical release version and stamped into both manifests
# before any artifact is built. Manual dispatch is supported for dry-runs.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 2.2.0). Defaults to the tag."
        required: false
        type: string

permissions:
  contents: write   # create the GitHub Release + push to gh-pages
  pages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AUTODOM_REPO_SLUG: eziocode/autodom-extension
  CHROME_EXTENSION_ID: ${{ vars.CHROME_EXTENSION_ID }}

jobs:
  release:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy_pages.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: ver
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "✘ resolved version '$VERSION' is not semver" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing v$VERSION"

      - name: Validate required secrets / vars
        run: |
          missing=()
          [[ -z "${{ secrets.CHROME_CRX_PRIVATE_KEY }}" ]] && missing+=("secret CHROME_CRX_PRIVATE_KEY")
          [[ -z "${{ secrets.CHROME_EXTENSION_KEY }}"  ]] && missing+=("secret CHROME_EXTENSION_KEY")
          [[ -z "${{ env.CHROME_EXTENSION_ID }}"       ]] && missing+=("var CHROME_EXTENSION_ID")
          if (( ${#missing[@]} )); then
            printf '✘ missing required release inputs:\n' >&2
            printf '  - %s\n' "${missing[@]}" >&2
            echo 'See docs/RELEASE-SIGNING.md for how to mint these.' >&2
            exit 1
          fi

      - name: Use Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Stamp version into manifests + server package
        env:
          V: ${{ steps.ver.outputs.version }}
        run: |
          node -e '
            const fs = require("fs");
            const v = process.env.V;
            for (const p of ["extension/manifest.json", "server/package.json"]) {
              const j = JSON.parse(fs.readFileSync(p, "utf8"));
              j.version = v;
              fs.writeFileSync(p, JSON.stringify(j, null, 2) + "\n");
              console.log("stamped", p, "->", v);
            }
          '

      - name: Inject Chrome `key` into manifest.json
        env:
          KEY_B64: ${{ secrets.CHROME_EXTENSION_KEY }}
        run: |
          node -e '
            const fs = require("fs");
            const path = "extension/manifest.json";
            const j = JSON.parse(fs.readFileSync(path, "utf8"));
            const key = (process.env.KEY_B64 || "").trim();
            // 2048-bit RSA SPKI in base64 is ~392 chars; allow 256+ to cover
            // both 2048 and 4096-bit keys, and refuse anything that does not
            // look like clean base64 (prevents a tampered secret from
            // shipping a junk `key` field that would silently re-randomise
            // the extension ID).
            if (!/^[A-Za-z0-9+/]+={0,2}$/.test(key) || key.length < 256 || key.length > 1024) {
              console.error("✘ CHROME_EXTENSION_KEY is not valid base64 SPKI (got " + key.length + " chars)");
              process.exit(1);
            }
            j.key = key;
            fs.writeFileSync(path, JSON.stringify(j, null, 2) + "\n");
            console.log("injected key (", key.length, "chars) into", path);
          '

      - name: Build Chrome zip (Web Store-ready)
        run: bash scripts/build-chrome.sh

      - name: Pack signed CRX
        env:
          PEM: ${{ secrets.CHROME_CRX_PRIVATE_KEY }}
          V: ${{ steps.ver.outputs.version }}
        run: |
          echo "$PEM" > /tmp/autodom.pem
          chmod 600 /tmp/autodom.pem
          npx --yes crx3@1 \
            --keyPath=/tmp/autodom.pem \
            --crxPath="dist/autodom-${V}.crx" \
            "dist/chrome"
          shred -u /tmp/autodom.pem
          ls -lh "dist/autodom-${V}.crx"

      - name: Generate updates.xml
        env:
          V: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p gh-pages-publish
          node scripts/build-update-manifests.mjs \
            --version "$V" \
            --extension-id "$CHROME_EXTENSION_ID" \
            --crx-url "https://github.com/${AUTODOM_REPO_SLUG}/releases/download/v${V}/autodom-${V}.crx" \
            --out-dir gh-pages-publish

      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload Pages artifact (update manifests)
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: gh-pages-publish

      - name: Publish update manifests to GitHub Pages
        id: deploy_pages
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

      - name: Stage release assets
        env:
          V: ${{ steps.ver.outputs.version }}
        run: |
          {
            echo "dist/autodom-${V}.crx"
            echo "dist/autodom-chrome-${V}.zip"
          } > /tmp/release-assets.txt
          echo "── Release assets ──"
          cat /tmp/release-assets.txt
          {
            echo "RELEASE_FILES<<__EOF__"
            cat /tmp/release-assets.txt
            echo "__EOF__"
          } >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: AutoDOM v${{ steps.ver.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: ${{ env.RELEASE_FILES }}

      - name: Summary
        run: |
          {
            echo "## AutoDOM v${{ steps.ver.outputs.version }} released"
            echo
            echo "- CRX: \`dist/autodom-${{ steps.ver.outputs.version }}.crx\`"
            echo "- Chrome zip: \`dist/autodom-chrome-${{ steps.ver.outputs.version }}.zip\`"
            echo "- updates.xml published to \`gh-pages\`."
            echo
            echo "Existing installs will pick up this version on their next scheduled update check."
          } >> "$GITHUB_STEP_SUMMARY"
